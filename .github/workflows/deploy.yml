name: Deploy Astro site to Pages

# 1. EL GATILLO (El error que te salía era porque faltaba este bloque)
on:
  push:
    branches: [main, master, gh-pages]
  workflow_dispatch:

# 2. LOS PERMISOS DE SEGURIDAD
permissions:
  contents: read
  pages: write
  id-token: write

# 3. LOS TRABAJOS A EJECUTAR
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          
      - name: Install, build, and upload your Astro site
        uses: withastro/action@v3
        with:
          package-manager: pnpm 

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4