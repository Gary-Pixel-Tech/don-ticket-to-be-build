<!DOCTYPE html><html lang="es"> <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>DON TICKET | En Construcción</title><link rel="icon" type="image/png" href="/logo.png"><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="/_astro/index.g99yurJ1.css"></head> <body class="flex items-center justify-center min-h-screen p-4 md:p-8 relative"> <!-- Subtle Graphical Grid Pattern --> <div class="fixed inset-0 pointer-events-none opacity-[0.03] z-[-1]" style="background-image: radial-gradient(#0A1B33 1px, transparent 1px); background-size: 32px 32px;"></div> <!-- Main Canvas --> <main class="w-full max-w-[1440px] flex flex-col items-center justify-center space-y-12 text-center relative z-10"> <!-- Brand Identity Container --> <div class="logo-container flex flex-col items-center space-y-8 fade-in"> <!-- Illustrative Logo Anchor --> <div class="floating-logo"></div> <!-- Brand Typography --> <div class="flex flex-col items-center space-y-4"> <h1 class="font-montserrat text-3xl md:text-4xl lg:text-[40px] font-[900] tracking-[0.25em] text-[#0A1B33] uppercase slide-up">
DON TICKET
</h1> <!-- Divider Rule (Auditor Style) --> <div class="w-16 h-[2px] bg-[#0A1B33]/20 slide-up" style="animation-delay: 0.2s;"></div> </div> </div> <!-- Status Message --> <div class="flex flex-col items-center space-y-3 slide-up" style="animation-delay: 0.4s;"> <h2 class="font-montserrat text-lg md:text-2xl text-[#0A1B33]/80 tracking-widest font-normal uppercase px-4">
ESTAMOS PREPARANDO ALGO EXCEPCIONAL
</h2> </div> </main> <!-- Micro-interaction for a subtle "gentleman" effect --> <script type="module">document.addEventListener("mousemove",t=>{const o=document.querySelector(".floating-logo");if(!o)return;const e=o.getBoundingClientRect(),n=e.left+e.width/2,r=e.top+e.height/2,c=(t.clientY-r)/50,l=(t.clientX-n)/50;o.style.transform=`rotateX(${-c}deg) rotateY(${l}deg)`});document.addEventListener("mouseleave",()=>{const t=document.querySelector(".floating-logo");t&&(t.style.transform="rotateX(0deg) rotateY(0deg)")});</script> </body> </html>
