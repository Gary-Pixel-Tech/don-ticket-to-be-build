<style>
        body {
            background-color: #FFFFFF;
            overflow: hidden;
        }

        .gentleman-border {
            border: 1px solid #0A1B33;
        }

        .fade-in {
            animation: fadeIn 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .slide-up {
            animation: slideUp 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .logo-container {
            perspective: 1000px;
        }

        .floating-logo {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotateX(0deg); }
            50% { transform: translateY(-10px) rotateX(2deg); }
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>

<body class="flex items-center justify-center min-h-screen p-margin-desktop">
<!-- Main Canvas -->
<main class="w-full max-w-max-width flex flex-col items-center justify-center space-y-12 text-center">
<!-- Brand Identity Container -->
<div class="logo-container flex flex-col items-center space-y-8 fade-in">
<!-- Illustrative Logo Anchor -->
<div class="floating-logo">
<img alt="DON TICKET logo showing a white receipt with a brown fedora hat and a black mustache" class="w-64 h-auto object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAXTi_NTSTIJxQGNnsIZY0OLfc22BZtbNXU1tFYgcvgUG232MGN5Y4Amn0d6rT5OuYGMFAOrBgLUSR23DdLN1TiPd9kEj29FEtZ24FvikpJXCMy-3pYrznzoZ4XAf_C8c8PePrcEOKYc36o-194FDnGEvB4xyL8gbsmx5OaU87yj0GmbJTWE3jXWkVqOKEpjEunbOJj8fRLmDAokJvC2ZcwvHIfZeNurnFAQ2g2hYhuVRBgneapARB-FXOzBRY38UGEYOHz9xXI4fno"/>
</div>
<!-- Brand Typography -->
<div class="flex flex-col items-center space-y-4">
<h1 class="font-h1-desktop text-h1-desktop font-[900] tracking-[0.25em] text-brand-navy uppercase slide-up">
                    DON TICKET
                </h1>
<!-- Divider Rule (Auditor Style) -->
<div class="w-16 h-[2px] bg-brand-navy/20 slide-up" style="animation-delay: 0.2s;"></div>
</div>
</div>
<!-- Status Message -->
<div class="flex flex-col items-center space-y-3 slide-up" style="animation-delay: 0.4s;">
<h2 class="font-h2 text-h2 text-brand-navy/80 tracking-widest font-normal uppercase">
                ESTAMOS PREPARANDO ALGO EXCEPCIONAL
            </h2>
<p class="font-label-caps text-label-caps text-brand-navy/50 tracking-[0.3em] uppercase">
                La excelencia en auditoría fiscal automatizada
            </p>
</div>
<!-- Subtle Graphical Grid Pattern (Mid-Century Sartorial Reference) -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] z-[-1]" style="background-image: radial-gradient(#0A1B33 1px, transparent 1px); background-size: 32px 32px;">
</div>
</main>
<!-- Micro-interaction for a subtle "gentleman" effect -->
<script>
        document.addEventListener('mousemove', (e) => {
            const logo = document.querySelector('.floating-logo');
            const rect = logo.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const rotateX = (e.clientY - centerY) / 50;
            const rotateY = (e.clientX - centerX) / 50;
            
            logo.style.transform = `rotateX(${-rotateX}deg) rotateY(${rotateY}deg)`;
        });

        // Reset transform when mouse leaves
        document.addEventListener('mouseleave', () => {
            const logo = document.querySelector('.floating-logo');
            logo.style.transform = `rotateX(0deg) rotateY(0deg)`;
        });
    </script>
</body></html>
